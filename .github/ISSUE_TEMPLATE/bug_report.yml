name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I run the bot, it crashes with..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Set env var X to '...'
        2. Run `python telegram_bot_music_youtube.py`
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste the relevant section of `bot.log` or console output.
      render: text

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: How are you running the bot?
      options:
        - GitHub Actions (scheduled)
        - Docker
        - Local Python
        - Windows Task Scheduler
    validations:
      required: true
