name: Run Music Bot (headless engine — manual only)

# The desktop app (gui_app.py) is the product. This workflow runs the bundled
# headless engine on demand only. The daily `schedule:` trigger was removed so
# the bot never auto-runs with real credentials/cookies on a public repo
# (datacenter IPs are blocked by YouTube anyway, so scheduled runs only
# produced noisy public failures and history-polluting state commits).
on:
  workflow_dispatch:          # manual trigger only (Actions tab → Run workflow)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit state files back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode YouTube cookies
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
        run: |
          python - <<'EOF'
          import base64, os
          raw = os.environ.get("YOUTUBE_COOKIES_B64", "").strip()
          if raw:
              data = base64.b64decode(raw)
              with open("youtube_cookies.txt", "wb") as f:
                  f.write(data)
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("YOUTUBE_COOKIES_FILE=youtube_cookies.txt\n")
              print("Cookies decoded successfully.")
          else:
              print("No YOUTUBE_COOKIES_B64 secret found — running without cookies.")
          EOF

      - name: Run bot
        # Channels use the documented numbered CHANNEL_N_* format (see
        # .env.example). The secret *names* are kept as-is so existing repo
        # secrets keep working — only the env-var keys the engine reads changed.
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_1_PLAYLIST: ${{ secrets.PLAYLIST_ANDREY }}
          CHANNEL_1_TELEGRAM: ${{ secrets.TELEGRAM_CHANNEL_ANDREY }}
          CHANNEL_2_PLAYLIST: ${{ secrets.PLAYLIST_BAYBA }}
          CHANNEL_2_TELEGRAM: ${{ secrets.TELEGRAM_CHANNEL_BAYBA }}
          ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: python telegram_bot_music_youtube.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f sent_videos_*.json pinned_msgs_*.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update bot state [skip ci]"
            git push
          fi

      - name: Upload bot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_id }}
          path: bot.log
          retention-days: 7
