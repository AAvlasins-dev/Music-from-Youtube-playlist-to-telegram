name: Run Music Bot

on:
  schedule:
    - cron: '0 9 */2 * *'   # every 2 days at 09:00 UTC
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit state files back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
        run: python telegram_bot_music_youtube.py

      # State files are gitignored locally but must persist between CI runs.
      # Force-add them so the next scheduled run knows which videos were already posted.
      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f sent_videos.json pinned_msgs.json
          git diff --staged --quiet || \
            git commit -m "chore: update bot state [skip ci]" && git push

      - name: Upload bot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_id }}
          path: bot.log
          retention-days: 7
