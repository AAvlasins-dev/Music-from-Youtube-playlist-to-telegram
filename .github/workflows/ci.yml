name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint-and-test:
    # Test on both the CI default (Linux) and the real target OS (Windows),
    # where the winreg autostart / CREATE_NO_WINDOW / .exe-discovery code paths
    # actually run.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Qt runtime libraries (Linux only — for the PyQt6 GUI tests)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Smoke-import both modules (fail — don't skip — on a real import break)
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -c "import gui_app, telegram_bot_music_youtube; print('imports OK')"

      - name: Run tests (pytest)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q
